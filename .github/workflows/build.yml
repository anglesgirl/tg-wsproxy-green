name: Build

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build launcher
        run: |
          cd launcher
          go build -ldflags="-H windowsgui -s -w" -o "../启动Telegram.exe" main.go

      - name: Download old release package
        run: |
          curl -L -o old.zip "https://github.com/anglesgirl/tg-wsproxy-green/releases/download/v1.3.0/TG-WSS-green-v1.3.0.zip"
          Expand-Archive -Path old.zip -DestinationPath oldpkg -Force

      - name: Build new package
        run: |
          New-Item -ItemType Directory -Force -Path "TG-绿色版"
          Copy-Item -Path "oldpkg\*" -Destination "TG-绿色版" -Recurse -Force
          Copy-Item -Path "启动Telegram.exe" -Destination "TG-绿色版\启动Telegram.exe" -Force
          Compress-Archive -Path "TG-绿色版\*" -DestinationPath "TG-绿色版-v2.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TG-绿色版-v2
          path: TG-绿色版-v2.zip

      - name: Delete old v2 release
        run: |
          gh release delete v2 --yes --cleanup-tag 2>$null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2
          name: TG绿色版 v2（tg://proxy 自动配置）
          body: |
            ## v2 - tg://proxy 自动配置方案

            ### 下载
            下载 `TG-绿色版-v2.zip`，解压后双击 `启动Telegram.exe` 即可，无需其他操作。

            ### 使用
            1. 解压 zip
            2. 双击 `启动Telegram.exe`
            3. 首次运行 Telegram 弹出"启用代理"，点"启用"
            4. 之后双击直接用，代理自动连接

            ### 包含
            - 启动Telegram.exe（v2，tg://proxy 自动配置）
            - Telegram Desktop（官方便携版）
            - TgWsProxy.exe（v1.8.1）
            - 使用说明.md

            ### 与 v1 的区别
            - 不再强制显示代理窗口
            - 用 `tg://proxy` 深度链接自动配置 Telegram
            - 代理静默在托盘运行
          files: TG-绿色版-v2.zip
          prerelease: false
